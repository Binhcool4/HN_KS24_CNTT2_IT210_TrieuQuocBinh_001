<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách Book</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <div th:if="${listBook.size()==0}">
        <h3 class="text-danger">Chưa có sách nào!</h3>
    </div>
    <div th:if="${listBook.size()>0}">
        <h1>Danh sách nhân viên</h1>
        <h6 th:if="${message}" th:text="${message}" class="text-danger"></h6>

        <form th:action="@{/books/search-by-name}" method="get">
            <b>Employee name: </b>
            <input type="text" name="fullName">
            <input type="submit" value="Tìm kiếm" class="btn btn-primary">
        </form>
        <br>

        <table class="table table-bordered table-striped">
            <tr>
                <th>Số thứ tự</th>
                <th>Title</th>
                <th>Author</th>
                <th>Quantity</th>
                <th>IMG</th>
                <th>Action</th>
            </tr>
            <tr th:each="e,index:${listBook}">
                <td th:text="${index.count}"></td>

                <td th:text="${e.title}"></td>
                <td th:text="${e.author}"></td>
                <td th:text="${e.quantity}"></td>
                <td>
                    <img width="50px" height="50px" th:src="@{|/resources/images/${e.avatar}|}" alt=""/>
                </td>
                <td>
                    <a th:href="@{/books/delete(id=${e.id})}"
                       onclick="return confirm('Bạn có chắc chắn xóa?')">Xóa</a>
                </td>
            </tr>
        </table>
    </div>
    <a th:href="@{/books/add}">Thêm mới sách</a>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
